name: Update plates hourly

on:
  schedule:
    - cron: "0,30 * * * *"
    - cron: "10,40 * * * *"
    - cron: "20,50 * * * *"
  workflow_dispatch: {}

concurrency:
  group: update-plates
  cancel-in-progress: true

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show files
        run: |
          pwd
          ls -la

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run all scrapers in parallel
        env:
          JSON_FILE_PATH: public/plates/plates.json
          BILOPSLAG_COOKIES_JSON: ${{ secrets.BILOPSLAG_COOKIES_JSON }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          python "bilopslag.nu.sky.py" &
          python "EN_med_print_til_plates_supabase.py" &
          python "EP_med_print_til_plates_json_supabase.py" &
          wait
